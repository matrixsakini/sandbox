<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Chores</title>
<style>
  :root {
    --bg: #f6f5f2;
    --card: #ffffff;
    --ink: #2b2a27;
    --muted: #8a877f;
    --line: #e7e4dd;
    --accent: #2f7d5c;
    --accent-soft: #e3f0e9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191b1a;
      --card: #232624;
      --ink: #ece9e2;
      --muted: #94978f;
      --line: #33372f;
      --accent: #6cc09a;
      --accent-soft: #24382f;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink);
    padding: max(16px, env(safe-area-inset-top)) 16px 32px;
    max-width: 480px; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  header { margin-bottom: 16px; }
  h1 { font-size: 1.4rem; }
  #week { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  #status { color: var(--muted); font-size: 0.75rem; margin-top: 2px; min-height: 1em; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 72px 72px;
    gap: 6px;
    align-items: stretch;
  }
  .head {
    font-size: 0.8rem; font-weight: 600; color: var(--muted);
    text-align: center; padding: 6px 2px; align-self: end;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .label {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 12px; font-size: 0.95rem; display: flex; align-items: center;
  }
  button.cell {
    background: var(--card); border: 1px solid var(--line); border-radius: 10px;
    font-size: 1.3rem; color: transparent; cursor: pointer; min-height: 46px;
    transition: background 0.15s;
  }
  button.cell.done { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  button.cell:active { transform: scale(0.96); }
  footer { margin-top: 20px; color: var(--muted); font-size: 0.75rem; text-align: center; }
</style>
</head>
<body>
<header>
  <h1>Chores</h1>
  <div id="week">&nbsp;</div>
  <div id="status"></div>
</header>
<div class="grid" id="grid"></div>
<footer>Tap a cell to mark it done. The board resets every Monday.</footer>

<script>
(() => {
  'use strict';
  const API = '/api/v1/chores/board';
  const POLL_MS = 4000;
  const grid = document.getElementById('grid');
  const weekEl = document.getElementById('week');
  const statusEl = document.getElementById('status');
  let board = null;
  let pending = 0; // in-flight toggles; skip poll repaints while > 0

  function render() {
    if (!board) return;
    weekEl.textContent = `Week ${board.weekId.split('-W')[1]} · ${board.weekStart} → ${board.weekEnd}`;
    grid.innerHTML = '';
    grid.appendChild(headCell(''));
    board.people.forEach(p => grid.appendChild(headCell(p)));
    for (const chore of board.chores) {
      const label = document.createElement('div');
      label.className = 'label';
      label.textContent = chore.label;
      grid.appendChild(label);
      chore.done.forEach((done, person) => {
        const btn = document.createElement('button');
        btn.className = 'cell' + (done ? ' done' : '');
        btn.textContent = '✓';
        btn.setAttribute('aria-label', `${chore.label} — ${board.people[person]}`);
        btn.setAttribute('aria-pressed', String(done));
        btn.addEventListener('click', () => toggle(chore, person, btn));
        grid.appendChild(btn);
      });
    }
  }

  function headCell(text) {
    const el = document.createElement('div');
    el.className = 'head';
    el.textContent = text;
    return el;
  }

  async function toggle(chore, person, btn) {
    const done = !btn.classList.contains('done');
    btn.classList.toggle('done', done); // optimistic
    pending++;
    try {
      const res = await fetch(API + '/marks', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ choreId: chore.id, person, done })
      });
      if (!res.ok) throw new Error(res.status);
      board = await res.json();
      statusEl.textContent = '';
    } catch (e) {
      statusEl.textContent = 'Could not save — retrying on next refresh';
    } finally {
      pending--;
      if (pending === 0) render();
    }
  }

  async function refresh() {
    if (pending > 0) return;
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(res.status);
      board = await res.json();
      statusEl.textContent = '';
      render();
    } catch (e) {
      statusEl.textContent = 'Offline — retrying…';
    }
  }

  refresh();
  setInterval(refresh, POLL_MS);
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) refresh();
  });
})();
</script>
</body>
</html>
