spring:
  application:
    name: trivia-service
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  webflux:
    problemdetails:
      enabled: true

server:
  port: 8080

trivia:
  kafka-enabled: ${TRIVIA_KAFKA_ENABLED:false}
  questions-per-quiz: 10
  answer-timeout-seconds: 30
  active-session-ttl: 30m
  completed-session-ttl: 5m

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  pattern:
    console: '{"timestamp":"%d{ISO8601}","level":"%p","logger":"%logger{36}","transactionId":"%X{transactionId:-none}","sessionId":"%X{sessionId:-none}","message":"%msg"}%n'